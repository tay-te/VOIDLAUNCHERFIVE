name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --mac --universal
          - os: windows-latest
            args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version --allow-same-version

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish -- ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark as non-draft
          gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ github.ref_name }}$" | head -1)

          # Build release notes from commit messages (skip merges and co-author lines)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"%s" "${PREV_TAG}..${{ github.ref_name }}" \
              | grep -v "^Merge " \
              | grep -v "Co-Authored-By" \
              | sed 's/^/- /')
          else
            NOTES="- Initial release"
          fi

          # Only update if we have notes and the body is currently empty
          CURRENT_BODY=$(gh release view "${{ github.ref_name }}" --json body -q '.body' --repo "${{ github.repository }}")
          if [ -z "$CURRENT_BODY" ] && [ -n "$NOTES" ]; then
            gh release edit "${{ github.ref_name }}" --notes "$NOTES" --repo "${{ github.repository }}"
          fi
